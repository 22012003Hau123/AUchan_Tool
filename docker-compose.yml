services:
  app:
    build: .
    container_name: pdf_compare_tool
    ports:
      - "8502:8502" # Map port 8502 trên host vào port 8502 của container
    volumes:
      - .:/app # Mount thư mục hiện tại vào /app để dữ liệu (output, bbox...) được lưu lại trên host
    env_file:
      - .env # Load biến môi trường từ file .env (API keys)
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
